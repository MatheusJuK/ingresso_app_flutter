name: ingresso_app_flutter
description: "App de vendas de ingressos para eventos, desenvolvido em Flutter."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.3.2

  http: ^1.6.0

  cookie_jar: ^4.0.9

  package_info_plus: ^9.0.1

  dio_cookie_manager: ^3.4.0

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5

  # Local Storage
  shared_preferences: ^2.5.3

  # SQLite
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Maps / Location (funcionalidade extra)
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # UI Helpers
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App Icon
  flutter_launcher_icons: ^0.14.4

  # Splash Screen
  flutter_native_splash: ^2.4.6

flutter:
  assets:
    - .env
    - assets/
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: assets/app_icon.png

flutter_native_splash:
  color: "#6750A4"
  image: assets/splash_icon.png
  android: true
  ios: true
  web: false
